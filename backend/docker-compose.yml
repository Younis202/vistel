version: "3.9"

# ============================================================
# Retina-GPT Full Stack Deployment
# ============================================================
#
# Services:
#   api        — FastAPI inference server (GPU)
#   nginx      — Reverse proxy + SSL termination
#   redis      — Job queue for async batch processing
#
# Usage:
#   # Development (CPU, demo mode)
#   docker-compose up
#
#   # Production (GPU, with checkpoint)
#   RETINA_CHECKPOINT=/path/to/checkpoint.pt \
#   API_KEY=your-secret-key \
#   docker-compose -f docker-compose.yml up -d
#
#   # Scale API horizontally
#   docker-compose up --scale api=4
# ============================================================

services:

  # ── Retina-GPT Inference API ────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: retina-gpt:latest
    container_name: retina_gpt_api
    restart: unless-stopped

    ports:
      - "8000:8000"

    environment:
      # Model
      - RETINA_CHECKPOINT=${RETINA_CHECKPOINT:-}
      - API_KEY=${API_KEY:-}

      # Runtime
      - PYTHONUNBUFFERED=1
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-}

      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}

    volumes:
      # Mount checkpoints from host (avoids rebuilding image when model changes)
      - ${CHECKPOINT_DIR:-./checkpoints}:/app/checkpoints:ro
      # Mount data directory (optional — for batch analysis)
      - ${DATA_DIR:-./data}:/app/data:ro
      # Reports output
      - ${REPORTS_DIR:-./reports}:/app/reports:rw
      # Logs
      - ./logs:/app/logs:rw

    # GPU support (requires nvidia-docker2)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    command: >
      uvicorn api.main:app
        --host 0.0.0.0
        --port 8000
        --workers 2
        --log-level ${LOG_LEVEL:-info}

  # ── Nginx Reverse Proxy ────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: retina_gpt_nginx
    restart: unless-stopped
    depends_on:
      - api

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./deployment/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deployment/nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx:rw

    profiles:
      - production    # Only start with: docker-compose --profile production up

  # ── Redis (async job queue for batch processing) ───────────
  redis:
    image: redis:7-alpine
    container_name: retina_gpt_redis
    restart: unless-stopped

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru

    profiles:
      - async    # Only start with: docker-compose --profile async up

# ── Volumes ─────────────────────────────────────────────────
volumes:
  redis_data:
    driver: local
