# ============================================================
# Retina-GPT Model Configuration
# ============================================================

model:
  size: "base"           # tiny | base | large

  backbone:
    image_size: 224
    patch_size: 16
    in_channels: 3
    embed_dim: 768
    depth: 12
    num_heads: 12
    mlp_ratio: 4.0
    drop_rate: 0.0
    attn_drop_rate: 0.0
    drop_path_rate: 0.1
    use_fundus_pos_embed: true
    num_register_tokens: 4
    use_layerscale: true
    layerscale_init: 0.0001
    return_intermediate: true
    intermediate_layers: [3, 6, 9, 11]

  heads:
    quality:
      enabled: true
      hidden_dim: 256
      num_classes: 2
      dropout: 0.3

    classification:
      enabled: true
      hidden_dim: 512
      num_classes: 5
      dropout: 0.3
      use_ordinal: true

    segmentation:
      enabled: false
      decoder_channels: [512, 256, 128, 64]
      num_classes: 1

    detection:
      enabled: false
      num_classes: 4      # MA, HE, EX, SE
      hidden_dim: 256

  language:
    enabled: false
    lm_model_id: "gpt2-medium"
    num_visual_tokens: 16
    max_new_tokens: 512
    temperature: 0.7
    freeze_lm_backbone: true

preprocessing:
  target_size: [224, 224]
  clahe_clip_limit: 2.0
  clahe_tile_grid_size: [8, 8]
  use_green_channel: true
  apply_circular_mask: true
  mask_scale: 0.95
  normalize: true
  use_imagenet_stats: true
